<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editor em Massa - Grupos</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #1a1a1a;
      --accent: #7c3aed;
      --bg: #f8f9fa;
      --card-bg: #ffffff;
      --border: #e0e0e0;
      --text: #1a1a1a;
      --text-muted: #6b6b6b;
      --success: #10b981;
      --danger: #ef4444;
      --shadow: 0 4px 20px rgba(0,0,0,0.06);
      --radius: 12px;
    }

    * { margin:0; padding:0; box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); padding: 20px; line-height: 1.5; }

    header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; padding: 0 10px; }
    header h1 { font-size: 1.5rem; font-weight: 700; background: linear-gradient(135deg, #1a1a1a, #555); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
    .back-btn { text-decoration: none; color: var(--text-muted); font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 6px; }

    .main-grid { display: grid; grid-template-columns: 1fr 320px; gap: 20px; align-items: start; }
    @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }

    .card { background: var(--card-bg); border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow); overflow: hidden; }
    .card-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: #fafafa; }
    .card-header h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); font-weight: 700; }

    /* FILTROS */
    .filter-bar { padding: 16px 20px; display: flex; gap: 12px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
    .search-input { flex: 1; min-width: 200px; padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border); font-size: 14px; background: #fff; transition: border-color 0.2s; }
    .search-input:focus { outline: none; border-color: var(--accent); }
    .btn { padding: 10px 20px; border-radius: 8px; border: none; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 8px; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-accent { background: var(--accent); color: white; }
    .btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* TABELA */
    .table-container { max-height: calc(100vh - 250px); overflow-y: auto; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 14px 20px; font-size: 11px; text-transform: uppercase; color: var(--text-muted); background: #fafafa; border-bottom: 2px solid var(--border); position: sticky; top: 0; z-index: 10; }
    td { padding: 12px 20px; font-size: 13px; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: #fcfcfc; }

    .check-cell { width: 40px; text-align: center; }
    input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; accent-color: var(--accent); }

    .badge-grupo { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; background: #eee; color: #555; }

    /* SIDEBAR PAINEL */
    .panel-body { padding: 20px; display: flex; flex-direction: column; gap: 15px; }
    .info-stat { display: flex; justify-content: space-between; font-size: 13px; font-weight: 500; }
    .group-select { padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); font-size: 14px; font-family: inherit; }

    /* LOGS & PROGRESS */
    .progress-outer { height: 6px; background: #eee; border-radius: 3px; overflow: hidden; margin: 10px 0; }
    .progress-inner { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s; }
    .log-area { height: 150px; background: #fafafa; border: 1px solid var(--border); border-radius: 8px; padding: 10px; overflow-y: auto; font-family: 'DM Mono', monospace; font-size: 11px; }
    .log-entry { margin-bottom: 4px; border-bottom: 1px solid #f0f0f0; padding-bottom: 2px; }
    .log-ok { color: var(--success); }
    .log-err { color: var(--danger); font-weight: 700; }

    /* TOAST */
    #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--primary); color: #fff; padding: 12px 24px; border-radius: 30px; font-size: 13px; font-weight: 700; opacity: 0; transition: all 0.3s; z-index: 1000; pointer-events: none; }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(-10px); }
  </style>
</head>
<body>

  <header>
    <h1>📦 Editor em Massa: Grupos</h1>
    <a href="index.html" class="back-btn">← Voltar p/ o Estoque</a>
  </header>

  <div class="main-grid">
    <!-- ÁREA DE PRODUTOS -->
    <div class="card">
      <div class="card-header">
        <h2>Catálogo de Produtos</h2>
        <span id="txt-selecionado" style="font-size:12px; font-weight:700; color:var(--accent);">0 selecionados</span>
      </div>
      <div class="filter-bar">
        <input type="text" id="ipt-busca" class="search-input" placeholder="🛒 Digite nome ou código do produto...">
        <select id="sel-filtro-grupo" class="search-input" style="flex:0; min-width:180px;">
          <option value="">Filtrar por Grupo Atual...</option>
        </select>
        <button id="btn-carregar" class="btn btn-primary">Carregar Catálogo</button>
      </div>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th class="check-cell"><input type="checkbox" id="chk-all"></th>
              <th>Produto</th>
              <th>Grupo Atual</th>
              <th>Qtd.</th>
            </tr>
          </thead>
          <tbody id="tbody-prods">
            <tr><td colspan="4" style="text-align:center; padding: 40px; color:#888;">Clique em "Carregar Catálogo" para começar.</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- PAINEL DE AÇÃO -->
    <div class="card">
      <div class="card-header"><h2>Ação em Massa</h2></div>
      <div class="panel-body">
        <div class="info-stat">
          <span>Itens Selecionados:</span>
          <span id="stat-count">0</span>
        </div>
        
        <label style="font-size:11px; font-weight:700; color:var(--text-muted); text-transform:uppercase;">Novo Grupo de Destino:</label>
        <select id="sel-novo-grupo" class="group-select">
          <option value="">Selecione o Grupo...</option>
        </select>

        <button id="btn-executar" class="btn btn-accent" style="width:100%; margin-top:10px;" disabled>🚀 Atualizar Produtos Selecionados</button>
        
        <div class="progress-outer">
          <div class="progress-inner" id="pb-inner"></div>
        </div>
        <div id="pb-status" style="font-size:11px; text-align:center; color:var(--text-muted);">Pronto</div>

        <div class="log-area" id="log-list"></div>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    const API_HOST = window.location.origin.includes('vercel.app') ? "" : "https://caixa-three.vercel.app";
    const LOJA_ID = "361408";
    
    let todosProdutos = [];
    let grupos = {};
    let selecionados = new Set();

    // --- ELEMENTOS ---
    const el = {
      tbody: document.getElementById('tbody-prods'),
      iptBusca: document.getElementById('ipt-busca'),
      selFiltroGrupo: document.getElementById('sel-filtro-grupo'),
      selNovoGrupo: document.getElementById('sel-novo-grupo'),
      btnCarregar: document.getElementById('btn-carregar'),
      btnExecutar: document.getElementById('btn-executar'),
      chkAll: document.getElementById('chk-all'),
      txtSel: document.getElementById('txt-selecionado'),
      statCount: document.getElementById('stat-count'),
      log: document.getElementById('log-list'),
      pb: document.getElementById('pb-inner'),
      pStatus: document.getElementById('pb-status'),
      toast: document.getElementById('toast')
    };

    // --- INICIALIZAÇÃO ---
    async function init() {
      await carregarGrupos();
    }

    async function carregarGrupos() {
      el.selFiltroGrupo.innerHTML = '<option value="">Carregando grupos...</option>';
      try {
        const r = await fetch(`${API_HOST}/api/proxy?rota=grupos_produtos&loja_id=${LOJA_ID}`);
        const d = await r.json();
        if (d.code === 200 && d.data) {
          el.selFiltroGrupo.innerHTML = `
            <option value="">Filtrar por Grupo Atual...</option>
            <option value="SEM_GRUPO">-- SEM GRUPO --</option>
          `;
          el.selNovoGrupo.innerHTML = '<option value="">Selecione o Grupo...</option>';
          d.data.forEach(g => {
            grupos[g.id] = g.nome;
            const opt = `<option value="${g.id}">${g.nome}</option>`;
            el.selFiltroGrupo.innerHTML += opt;
            el.selNovoGrupo.innerHTML += opt;
          });
        }
      } catch (e) { log('Erro ao carregar grupos', 'err'); }
    }

    async function carregarProdutos() {
      el.btnCarregar.disabled = true;
      el.btnCarregar.textContent = '⏳ Buscando...';
      el.tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding: 40px; color:#888;">⏳ Carregando todos os produtos da base... Isso pode levar alguns segundos.</td></tr>';
      
      todosProdutos = [];
      let pag = 1, total = 1;

      try {
        do {
          const r = await fetch(`${API_HOST}/api/produtos?loja_id=${LOJA_ID}&limite=100&pagina=${pag}`);
          const d = await r.json();
          if (d.code !== 200) throw new Error('API ERRO');
          todosProdutos = todosProdutos.concat(d.data.filter(p => p.nome));
          total = d.meta.total_paginas;
          el.pStatus.textContent = `Carregando: ${pag}/${total}`;
          pag++;
        } while (pag <= total);

        renderizar();
        log(`Sucesso: ${todosProdutos.length} produtos carregados.`);
        el.pStatus.textContent = 'Catálogo pronto.';
      } catch (e) {
        log('Erro ao carregar o catálogo: ' + e.message, 'err');
      } finally {
        el.btnCarregar.disabled = false;
        el.btnCarregar.textContent = '🔄 Recarregar';
      }
    }

    function renderizar() {
      const busca = el.iptBusca.value.toLowerCase().trim();
      const filtroGrupo = el.selFiltroGrupo.value;

      const filtrados = todosProdutos.filter(p => {
        const matchesBusca = !busca || p.nome.toLowerCase().includes(busca) || (p.codigo_interno || "").toLowerCase().includes(busca);
        
        let matchesGrupo = true;
        if (filtroGrupo === "SEM_GRUPO") {
          matchesGrupo = !p.grupo_id || p.grupo_id == "0";
        } else if (filtroGrupo) {
          matchesGrupo = String(p.grupo_id) === String(filtroGrupo);
        }
        
        return matchesBusca && matchesGrupo;
      });

      if (filtrados.length === 0) {
        el.tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding: 40px; color:#888;">Nenhum produto encontrado.</td></tr>';
        return;
      }

      el.tbody.innerHTML = filtrados.map(p => {
        const isChecked = selecionados.has(p.id);
        const gNome = p.nome_grupo || grupos[p.grupo_id] || '<span style="color:#aaa">Nenhum</span>';
        return `
          <tr>
            <td class="check-cell"><input type="checkbox" class="chk-item" data-id="${p.id}" ${isChecked ? 'checked' : ''}></td>
            <td><div style="font-weight:700;">${p.nome}</div><div style="font-size:10px; color:#999;">SKU: ${p.codigo_interno || 'N/A'} (ID: ${p.id})</div></td>
            <td><span class="badge-grupo">${gNome}</span></td>
            <td>${p.estoque}</td>
          </tr>
        `;
      }).join('');

      el.tbody.querySelectorAll('.chk-item').forEach(c => {
        c.addEventListener('change', function() {
          if (this.checked) selecionados.add(this.dataset.id);
          else selecionados.delete(this.dataset.id);
          atualizarUI();
        });
      });
    }

    function atualizarUI() {
      const n = selecionados.size;
      el.txtSel.textContent = `${n} selecionados`;
      el.statCount.textContent = n;
      el.btnExecutar.disabled = n === 0 || !el.selNovoGrupo.value;
    }

    async function executarEmMassa() {
      const novoGrupoId = el.selNovoGrupo.value;
      const ids = Array.from(selecionados);
      if (!ids.length || !novoGrupoId) return;

      if (!confirm(`Deseja mover ${ids.length} produtos para o grupo "${grupos[novoGrupoId]}"?`)) return;

      el.btnExecutar.disabled = true;
      el.btnCarregar.disabled = true;
      let sucessos = 0, falhas = 0;
      el.pb.style.width = '0%';
      log(`🚀 Iniciando atualização de ${ids.length} itens...`);

      for (let i = 0; i < ids.length; i++) {
        const pid = ids[i];
        el.pStatus.textContent = `Processando: ${i+1}/${ids.length}`;
        el.pb.style.width = ((i+1)/ids.length * 100) + '%';

        try {
          let produtoParaUpdate = null;
          
          // 1. Tenta buscar como Produto
          const resGetP = await fetch(`${API_HOST}/api/proxy?rota=produtos/${pid}&loja_id=${LOJA_ID}`);
          const dataGetP = await resGetP.json();
          
          if (dataGetP.code === 200) {
            produtoParaUpdate = dataGetP.data;
          } else {
            // 2. Se falhar, tenta buscar como Serviço
            const resGetS = await fetch(`${API_HOST}/api/proxy?rota=servicos/${pid}&loja_id=${LOJA_ID}`);
            const dataGetS = await resGetS.json();
            if (dataGetS.code === 200) {
              produtoParaUpdate = dataGetS.data;
            }
          }

          let res;
          if (produtoParaUpdate) {
            // 3. Update com objeto COMPLETO (Estratégia mais segura)
            produtoParaUpdate.grupo_id = Number(novoGrupoId);
            res = await fetch(`${API_HOST}/api/proxy?rota=${produtoParaUpdate.id_servico ? 'servicos' : 'produtos'}/${pid}&loja_id=${LOJA_ID}`, {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(produtoParaUpdate)
            });
          } else {
            // 4. Fallback: Se não conseguir buscar dados, tenta update parcial (Funciona para alguns itens simples)
            res = await fetch(`${API_HOST}/api/proxy?rota=produtos/${pid}&loja_id=${LOJA_ID}`, {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ grupo_id: Number(novoGrupoId) })
            });
          }

          const d = await res.json();
          if (res.ok && (d.code === 200 || d.success || d.status === 'success')) {
            sucessos++;
            const p = todosProdutos.find(x => x.id == pid);
            if (p) { p.grupo_id = novoGrupoId; p.nome_grupo = grupos[novoGrupoId]; }
            log(`✅ ID ${pid}: OK`);
          } else {
            falhas++;
            const msg = d.data?.mensagem || d.data?.erro || (d.code === 500 ? "Erro 500/API (Tente Individual)" : "Erro Desconhecido");
            log(`❌ ID ${pid}: ${msg}`, 'err');
          }
        } catch (e) {
          falhas++;
          log(`❌ ID ${pid}: ${e.message}`, 'err');
        }

        // Delay para evitar Rate Limit
        if (i < ids.length - 1) await new Promise(r => setTimeout(r, 450));
      }

      log(`🏁 Concluído! Sucessos: ${sucessos} | Falhas: ${falhas}`);
      el.pStatus.textContent = 'Concluído.';
      mostrarToast(`✅ ${sucessos} produtos atualizados.`);
      el.btnCarregar.disabled = false;
      selecionados.clear();
      el.chkAll.checked = false;
      atualizarUI();
      renderizar();
    }

    // --- UTILS ---
    function log(msg, type = '') {
      const div = document.createElement('div');
      div.className = 'log-entry ' + (type === 'err' ? 'log-err' : 'log-ok');
      div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      el.log.prepend(div);
    }

    function mostrarToast(msg) {
      el.toast.textContent = msg;
      el.toast.className = 'show';
      setTimeout(() => el.toast.className = '', 3000);
    }

    // --- LISTENERS ---
    el.btnCarregar.addEventListener('click', carregarProdutos);
    el.btnExecutar.addEventListener('click', executarEmMassa);
    el.iptBusca.addEventListener('input', renderizar);
    el.selFiltroGrupo.addEventListener('change', renderizar);
    el.selNovoGrupo.addEventListener('change', atualizarUI);
    
    el.chkAll.addEventListener('change', function() {
      const checkboxes = el.tbody.querySelectorAll('.chk-item');
      checkboxes.forEach(c => {
        c.checked = this.checked;
        if (this.checked) selecionados.add(c.dataset.id);
        else selecionados.delete(c.dataset.id);
      });
      atualizarUI();
    });

    init();
  </script>
</body>
</html>
